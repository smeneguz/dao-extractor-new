name: Tests
# Tests / Code Coverage workflow runs unit tests and uploads a code coverage report.
# This workflow is run on pushes to main and every pull requests where a .go, .mod, .sum have been changed.
on:
  pull_request:
  push:
    branches:
      - main
      - release/v*

env:
  GOPRIVATE: github.com/dao-portal
  GH_ACCESS_TOKEN: ${{ secrets.GOPRIVATE_ACCESS_TOKEN }}
  RUN_ID: ${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}

# Cancel all previous runs of the same workflow when a new one is triggered in the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'tags/')}}

jobs:
  Unit-tests:
    runs-on: linux
    timeout-minutes: 30
    steps:
      - name: Remove unnecessary tools folder 🧹
        run: rm -rf /opt/hostedtoolcache

      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Go 🧰
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup GOPRIVATE 🛡️
        run: git config --global url.https://$GH_ACCESS_TOKEN@github.com/.insteadOf https://github.com/

      - name: Compute diff 📜
        uses: technote-space/get-diff-action@v6.1.2
        id: git_diff
        with:
          PATTERNS: |
            **/**.go
            go.mod
            go.sum

      - name: Build 🔨
        if: env.GIT_DIFF
        run: make build

      - name: Test & Coverage report creation 🧪
        if: env.GIT_DIFF
        run: make start-test-db && make test-unit

